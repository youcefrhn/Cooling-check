<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>فحص منظومة التبريد - نسخة سريعة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&family=Tajawal:wght@500;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #2d3436;   /* رمادي غامق للنصوص */
    --accent: #0984e3;    /* أزرق هادئ */
    --success: #00b894;   /* أخضر للبدء */
    --danger: #d63031;    /* أحمر للإيقاف */
    --bg-white: #ffffff;  /* الخلفية البيضاء */
    --light-gray: #f5f6fa;
  }

  body {
    background-color: var(--bg-white);
    color: var(--primary);
    font-family: 'Cairo', sans-serif;
    margin: 0;
    padding: 20px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* تصميم العداد الجديد */
  .timer-container {
    background: var(--light-gray);
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    text-align: center;
    max-width: 400px;
    width: 100%;
    margin-top: 50px;
  }

  .timer-display {
    font-family: 'Tajawal', sans-serif;
    font-size: 4rem;
    font-weight: 800;
    color: var(--primary);
    margin-bottom: 20px;
    font-variant-numeric: tabular-nums; /* لمنع اهتزاز الأرقام */
  }

  .controls {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .btn {
    padding: 12px 25px;
    border: none;
    border-radius: 10px;
    font-family: 'Cairo', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.1s;
  }

  .btn:active { transform: scale(0.95); }

  .btn-start { background: var(--success); color: white; }
  .btn-stop { background: var(--danger); color: white; }
  .btn-reset { background: #b2bec3; color: white; }

  h1 { color: var(--accent); margin-bottom: 10px; }
</style>
</head>
<body>

  <h1>فحص منظومة التبريد 🌡️</h1>
  <p>استخدم العداد بدقة لقياس وقت اشتغال الرياشة.</p>

  <div class="timer-container">
    <div class="timer-display" id="display">00:00:00</div>
    <div class="controls">
      <button class="btn btn-start" onclick="startTimer()">بدء</button>
      <button class="btn btn-stop" onclick="stopTimer()">إيقاف</button>
      <button class="btn btn-reset" onclick="resetTimer()">تصفير</button>
    </div>
  </div>

<script>
  let startTime;
  let elapsedTime = 0;
  let timerInterval;

  function timeToString(time) {
    let diffInHrs = time / 3600000;
    let hh = Math.floor(diffInHrs);

    let diffInMin = (diffInHrs - hh) * 60;
    let mm = Math.floor(diffInMin);

    let diffInSec = (diffInMin - mm) * 60;
    let ss = Math.floor(diffInSec);

    let diffInMs = (diffInSec - ss) * 100;
    let ms = Math.floor(diffInMs);

    let formattedMM = mm.toString().padStart(2, "0");
    let formattedSS = ss.toString().padStart(2, "0");
    let formattedMS = ms.toString().padStart(2, "0");

    return `${formattedMM}:${formattedSS}:${formattedMS}`;
  }

  function startTimer() {
    // السر تكمن هنا: نحسب الوقت بناءً على ساعة النظام وليس مجرد عداد
    startTime = Date.now() - elapsedTime;
    timerInterval = setInterval(function printTime() {
      elapsedTime = Date.now() - startTime;
      document.getElementById("display").innerHTML = timeToString(elapsedTime);
    }, 10); // تحديث سريع جداً وسلس
  }

  function stopTimer() {
    clearInterval(timerInterval);
  }

  function resetTimer() {
    clearInterval(timerInterval);
    document.getElementById("display").innerHTML = "00:00:00";
    elapsedTime = 0;
  }
</script>

</body>
</html>
